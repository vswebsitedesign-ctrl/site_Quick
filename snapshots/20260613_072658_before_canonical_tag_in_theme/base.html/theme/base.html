<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #F8FAFC;
      color: #1F2A37;
    }

    .sticky-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #1A365D;
      z-index: 1000;
    }

    .sticky-header nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
    }

    .sticky-header .logo img {
      height: 50px;
      display: block;
    }

    .nav-menu {
      list-style: none;
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .nav-menu a {
      color: #F8FAFC;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .nav-menu a:hover { color: #7A9A6F; }

    .nav-toggle { display: none; }

    .nav-toggle-label {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .nav-toggle-label span {
      display: block;
      width: 25px;
      height: 3px;
      background: #F8FAFC;
      border-radius: 3px;
    }

    @media (max-width: 768px) {
      .nav-toggle-label { display: flex; }

      .nav-menu {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: #1A365D;
        padding: 1rem 0;
        gap: 0;
      }

      .nav-menu li {
        width: 100%;
        text-align: center;
        padding: 0.75rem 0;
        border-top: 1px solid rgba(255,255,255,0.1);
      }

      .nav-toggle:checked ~ .nav-menu { display: flex; }
    }

    .page-wrap {
      padding-top: 74px;
    }

    footer {
      background: #E2E8F0;
      text-align: center;
      padding: 20px;
      color: #1F2A37;
    }

    .mobile-sticky-footer {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 999;
    }

    .single-cta {
      display: block;
      background: #7A9A6F;
      color: white;
      text-align: center;
      padding: 1rem;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .mobile-sticky-footer { display: block; }
    }
  </style>
</head>
<body><main>{{ content }}</main>

<div class="page-wrap">
  
</div>

</body>
</html>
