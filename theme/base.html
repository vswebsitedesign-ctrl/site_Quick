<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #F8FAFC;
      color: #1F2A37;
    }

    .sticky-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #1A365D;
      z-index: 1000;
    }

    .sticky-header nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
    }

    .sticky-header .logo img {
      height: 50px;
      display: block;
    }

    .nav-menu {
      list-style: none;
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .nav-menu a {
      color: #F8FAFC;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .nav-menu a:hover { color: #7A9A6F; }

    .nav-toggle { display: none; }

    .nav-toggle-label {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .nav-toggle-label span {
      display: block;
      width: 25px;
      height: 3px;
      background: #F8FAFC;
      border-radius: 3px;
    }

    @media (max-width: 768px) {
      .nav-toggle-label { display: flex; }

      .nav-menu {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: #1A365D;
        padding: 1rem 0;
        gap: 0;
      }

      .nav-menu li {
        width: 100%;
        text-align: center;
        padding: 0.75rem 0;
        border-top: 1px solid rgba(255,255,255,0.1);
      }

      .nav-toggle:checked ~ .nav-menu { display: flex; }
    }

    .page-wrap {
      padding-top: 74px;
    }

    footer {
      background: #E2E8F0;
      text-align: center;
      padding: 20px;
      color: #1F2A37;
    }

    .mobile-sticky-footer {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 999;
    }

    .single-cta {
      display: block;
      background: #7A9A6F;
      color: white;
      text-align: center;
      padding: 1rem;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .mobile-sticky-footer { display: block; }
    }
  
.site-footer {
  background: #1A365D;
  color: #F8FAFC;
  padding: 3rem 2rem 1rem 2rem;
  margin-top: 3rem;
}
.footer-inner {
  display: flex;
  flex-wrap: wrap;
  gap: 2rem;
  max-width: 1000px;
  margin: 0 auto 2rem auto;
}
.footer-col {
  flex: 1;
  min-width: 180px;
}
.footer-col h3 {
  color: #7A9A6F;
  font-size: 1rem;
  margin-bottom: 1rem;
}
.footer-col p {
  color: #F8FAFC;
  font-size: 0.9rem;
  line-height: 1.6;
}
.footer-col ul {
  list-style: none;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.footer-col ul a {
  color: #F8FAFC;
  text-decoration: none;
  font-size: 0.9rem;
}
.footer-col ul a:hover {
  color: #7A9A6F;
}
.footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 1rem;
  text-align: center;
}
.footer-bottom p {
  color: rgba(255,255,255,0.6);
  font-size: 0.85rem;
}
  </style>
  <link rel="canonical" href="{{ canonical_url }}">
</head>
<body>{{ header }}<main>{{ content }}</main>{{ footer }}{{ mobile_footer }}

<div class="page-wrap">
  
</div>

</body>
</html>
